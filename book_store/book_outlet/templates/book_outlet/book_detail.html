{% extends "book_outlet/base.html" %}

{% block title %}
    {{ book.title }}
{% endblock %}

{% block content %}
    <a href="{% url 'index' %}">Back to all books</a>
    <h1>{{ book.title }}</h1>
    <h2>Author: {{ book.author }}</h2>
    <p>Rating: {{ book.rating }}</p>
    <p>Is Bestselling: {{ book.is_bestselling }}</p>
{% endblock %}
